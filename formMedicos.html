<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <title>Registro de medicos </title>
</head>

<body>

    <header>
        <h1>Registro de medicos</h1>
        <main>
            <div class="form-container">
                {% if doctor %}
                <form action="/Medicos/actualizar/{{ doctor.id_doctor }}" method="POST">
                    {% else %}
                    <form action="/Medicos/guardar" method="POST">
                        {% endif %}

                        <div class="form-group">
                            <label>Nombre:</label>
                            <input type="text" name="nombre" value="{% if doctor %}{{ doctor.nombre }}{% endif %}"
                                required>
                        </div>

                        <div class="form-group">
                            <label>Especialidad:</label>
                            <input type="text" name="especialidad" placeholder="Ej: Cardiologia, Ginecologia"
                                value="{% if doctor %}{{ doctor.especialidad }}{% endif %}" required>
                        </div>

                        <div class="form-group">
                            <label>Edad:</label>
                            <input type="number" name="edad" value="{% if doctor %}{{ doctor.edad }}{% endif %}"
                                required>
                        </div>

                        <div class="form-group">
                            <label>Sexo:</label>
                            <input type="text" name="sexo" placeholder="Ej: Femenino"
                                value="{% if doctor %}{{ doctor.sexo }}{% endif %}" required>
                        </div>

                        <div class="form-group">
                            <label>Tipo de sangre:</label>
                            <input type="text" name="Tipo_de_sangre" placeholder="Ej: O+"
                                value="{% if doctor %}{{ doctor.Tipo_de_sangre }}{% endif %}" required>
                        </div>

                        <div class="form-group">
                            <label>Teléfono:</label>
                            <input type="number" name="telefono" placeholder="Ej: 555 555"
                                value="{% if doctor %}{{ doctor.telefono }}{% endif %}" required>
                        </div>

                        <div class="form-group">
                            <label>Turno:</label>
                            <input type="text" name="turno" placeholder="Ej: Matutino"
                                value="{% if doctor %}{{ doctor.turno }}{% endif %}" required>
                        </div>

                        <button type="submit" class="btn-submit">
                            {% if doctor %} Actualizar Datos {% else %} Registrar {% endif %}
                        </button>
                    </form>
            </div>

            <a href="/Medicos" class="btn-back"> Volver al Inicio</a>
        </main>

        <footer>
            <p>Armando Eliseo Alvarez Carreon - Programacion</p>
            <p>24308051280482 - 4-I</p>
        </footer>

</body>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: "Luckiest Guy", sans-serif;
        background-color: #FAC78C;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        background-color: rgb(245, 219, 191);
        width: 100%;
        padding: 20px 0;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    h1 {
        color: #3D382D;
        font-family: 'Luckiest Guy', sans-serif;
        margin: 0;
        font-size: 2rem;
    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 40px 20px;
        flex: 1;
    }

    .form-container {
        max-width: 500px;
        width: 100%;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(245, 239, 228, 0.7);
        border-top: 6px solid #F2D194;
    }

    .form-group {
        margin-bottom: 22px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
        font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #E0DAD0;
        border-radius: 6px;
        font-family: "Luckiest Guy", sans-serif;
        font-size: 14px;
        background-color: #FAF9F7;
        color: #333;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #CAC09E;
        background-color: #fff;
        box-shadow: 0 0 5px rgba(202, 190, 158, 0.4);
    }

    .btn-submit {
        background-color: #CAB89E;
        color: black;
        border: none;
        padding: 14px 15px;
        width: 100%;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-family: "Luckiest Guy", sans-serif;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: #B3A182;
    }

    .btn-back {
        display: inline-block;
        text-align: center;
        margin-top: 25px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .btn-back:hover {
        color: #B39D82;
    }

    footer {
        width: 100%;
        background-color: #F3F1ED;
        padding: 15px 0;
        text-align: center;
        font-size: 13px;
        color: #78736A;
    }

    footer p {
        margin: 4px 0;
        font-family: 'Luckiest Guy', sans-serif;
    }
</style>

</html>
